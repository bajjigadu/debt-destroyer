<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Debt Destroyer Pro v3 | Finance Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */
:root {
  --bg:#0d1117; --surface:#161b22; --surface2:#1c2333;
  --border:#30363d; --accent:#f0883e; --accent2:#58a6ff;
  --danger:#f85149; --success:#3fb950; --warning:#e3b341;
  --purple:#bc8cff; --text:#e6edf3; --text2:#8b949e;
  --radius:16px;
}
body{margin:0;font-family:DM Sans;background:var(--bg);color:var(--text);}
.app-shell{max-width:520px;margin:auto;}
.app-header{display:flex;justify-content:space-between;padding:10px;background:var(--surface);}
.hero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px;}
.stat-card{background:var(--surface);padding:10px;border-radius:12px;}
.tab-bar{display:flex;overflow-x:auto;background:var(--surface);}
.tab-btn{padding:10px;border:none;background:none;color:var(--text2);}
.tab-btn.active{color:var(--accent);}
.tab-panel{display:none;padding:10px;}
.tab-panel.active{display:block;}
.card{background:var(--surface);padding:10px;margin:10px;border-radius:12px;}
.debt-table{width:100%;font-size:12px;}
button{cursor:pointer;}
</style>
</head>

<body>
<div class="app-shell">

<!-- HEADER -->
<div class="app-header">
  <div>💸 Debt Destroyer v3</div>
  <button id="modeBtn">Switch Mode</button>
</div>

<!-- HERO -->
<div class="hero-grid">
  <div class="stat-card">Debt<br><b id="heroDebt">$0</b></div>
  <div class="stat-card">Bank<br><b id="heroBank">$0</b></div>
  <div class="stat-card">Weekly<br><b id="heroWeekly">$0</b></div>
</div>

<!-- QUICK ACTIONS -->
<div class="card">
  <button id="addDebtRowBtn">+ Add Debt</button>
  <button id="quickAddPaymentBtn">Pay $50</button>
  <button id="manualSalaryBtn">Payday</button>
  <button id="undoBtn">Undo</button>
</div>

<!-- TABS -->
<div class="tab-bar">
  <button class="tab-btn active" data-tab="debts">Debts</button>
  <button class="tab-btn" data-tab="income">Income</button>
  <button class="tab-btn" data-tab="tracker">Tracker</button>
  <button class="tab-btn" data-tab="plan">Plan</button>
  <button class="tab-btn" data-tab="settings">Settings</button>
</div>

<!-- DEBTS -->
<div class="tab-panel active" id="debts">
  <div class="card">
    <table class="debt-table">
      <tbody id="debtTableBody"></tbody>
    </table>
  </div>
</div>

<!-- INCOME -->
<div class="tab-panel" id="income">
  <div class="card">
    <input id="salary" placeholder="Weekly Salary">
    <input id="expenses" placeholder="Monthly Expenses">
    <div>Surplus: <span id="surplus">0</span></div>
  </div>
</div>

<!-- TRACKER -->
<div class="tab-panel" id="tracker">
  <div class="card">Weekly tracker (simplified v3)</div>
</div>

<!-- PLAN -->
<div class="tab-panel" id="plan">
  <div class="card">
    <b>Strategy:</b> <span id="strategy">Avalanche</span>
  </div>
</div>

<!-- SETTINGS -->
<div class="tab-panel" id="settings">
  <div class="card">
    <button id="resetBtn">Reset All</button>
  </div>
</div>

</div>

<!-- TOAST -->
<div id="toast" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
background:#222;padding:8px 12px;border-radius:10px;display:none;color:#fff;"></div>

<script>
/* =========================
   PRO FINANCE APP v3 ENGINE
   ========================= */

const BANKS = {
  "CommBank":18.2,"NAB":16.5,"Westpac":15.9,"ANZ":17.8,
  "Afterpay":0,"Zip Pay":0,"Other":18
};

const money = n => "$" + Math.round(n||0).toLocaleString();

let S = {
  bank:+localStorage.getItem("bank")||0,
  debts:JSON.parse(localStorage.getItem("debts")||"[]"),
  saved:+localStorage.getItem("saved")||0,
  mode:localStorage.getItem("mode")||"avalanche",
  history:JSON.parse(localStorage.getItem("history")||"[]")
};

/* SAVE */
function save(){
  localStorage.setItem("bank",S.bank);
  localStorage.setItem("debts",JSON.stringify(S.debts));
  localStorage.setItem("saved",S.saved);
  localStorage.setItem("mode",S.mode);
  localStorage.setItem("history",JSON.stringify(S.history));
}

/* CALC */
function totalDebt(){
  return S.debts.reduce((a,b)=>a+(+b.balance||0),0);
}

function weekly(){
  return Math.ceil(totalDebt()/260)||0;
}

/* TOAST */
function toast(m){
  const t=document.getElementById("toast");
  t.innerText=m;t.style.display="block";
  setTimeout(()=>t.style.display="none",1200);
}

/* STRATEGY */
function sort(){
  return [...S.debts].sort((a,b)=>{
    return S.mode==="avalanche"
    ? b.rate-a.rate
    : a.balance-b.balance;
  });
}

/* APPLY PAYMENT */
function pay(amount){
  let list=sort();
  let r=amount;

  list.forEach(d=>{
    if(!r)return;
    let p=Math.min(d.balance,r);
    d.balance-=p;r-=p;
    S.history.push({a:p,b:d.bank,t:Date.now()});
  });
}

/* RENDER */
function render(){
  let tb=document.getElementById("debtTableBody");
  tb.innerHTML="";

  S.debts.forEach((d,i)=>{
    let tr=document.createElement("tr");

    tr.innerHTML=`
      <td><input value="${d.bank}" class="bank"></td>
      <td><input type="number" value="${d.balance}" class="bal"></td>
      <td>${d.rate||18}%</td>
      <td><button class="pay">-50</button></td>
      <td><button class="del">X</button></td>
    `;

    tr.querySelector(".bal").oninput=e=>{
      S.debts[i].balance=+e.target.value;
      sync();
    };

    tr.querySelector(".pay").onclick=()=>{
      pay(50);
      S.bank-=50;
      toast("Paid $50");
      sync();
    };

    tr.querySelector(".del").onclick=()=>{
      S.debts.splice(i,1);
      sync();
    };

    tb.appendChild(tr);
  });

  document.getElementById("heroDebt").innerText=money(totalDebt());
  document.getElementById("heroBank").innerText=money(S.bank);
  document.getElementById("heroWeekly").innerText=money(weekly());

  save();
}

/* SYNC */
function sync(){render();}

/* ACTIONS */
function addDebt(){
  S.debts.push({bank:"Other",balance:0,rate:18});
  sync();
}

function payday(){
  S.bank+=50;
  S.saved+=50;
  sync();
}

/* TABS */
document.querySelectorAll(".tab-btn").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    document.getElementById(b.dataset.tab).classList.add("active");
  };
});

/* INIT */
document.getElementById("addDebtRowBtn").onclick=addDebt;
document.getElementById("quickAddPaymentBtn").onclick=()=>pay(50);
document.getElementById("manualSalaryBtn").onclick=payday;
document.getElementById("undoBtn").onclick=()=>{S.history.pop();sync();};
document.getElementById("modeBtn").onclick=()=>{
  S.mode=S.mode==="avalanche"?"snowball":"avalanche";
  sync();
};
document.getElementById("resetBtn").onclick=()=>{
  if(confirm("Reset?")){localStorage.clear();location.reload();}
};

sync();
</script>

</body>
</html>
